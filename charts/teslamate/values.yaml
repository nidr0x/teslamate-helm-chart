replicaCount: 1

image:
  repository: teslamate/teslamate
  # Overrides the image tag whose default is the chart appVersion
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""
  annotations: {}

podAnnotations: {}

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

timeZone: UTC

# The customPostgreSQL configuration allows users to specify a custom PostgreSQL database for TeslaMate to use.
# This is useful for users who already have a PostgreSQL instance running and want to use it for TeslaMate.
# ref: https://www.postgresql.org/docs/current/index.html

customPostgreSQL:
  enabled: false
  host: ""
  user: ""
  password: ""
  existingSecret: ""
  existingSecretKey: "password"
  database: ""

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    username: teslamate
    password: "teslamate_password"
    database: teslamate
    existingSecret: ""
    existingSecretKey: "password"
  persistence:
    enabled: true
    size: 5Gi
    # storageClass: ""

# The MQTT function within TeslaMate allows useful values to be published to an MQTT broker.
# This is useful in allowing other automation platforms to consume data from TeslaMate.
# ref: https://docs.teslamate.org/docs/integrations/mqtt/
mqtt:
  enabled: false

  host:
  username:
  password:
  existingSecret: ""
  existingSecretKey: "password"

  # Enables TLS (true/false)
  tls:
  # Accepts invalid certificates (true/false)
  tlsAcceptInvalidCerts:

# Configures whether to check the origin header or not.
checkOrigin: false

# Host part used for generating URLs throughout the app
# required
virtualHost:

# Valid values are 'en' or 'de'
locale: en

global:
  nameSeparator: "-"

probes:
  liveness:
    failureThreshold: 15
    periodSeconds: 10
  readiness:
    failureThreshold: 15
    periodSeconds: 10
  startup:
    initialDelaySeconds: 15
    failureThreshold: 30
    periodSeconds: 10

# Extra environment variables that will be pass onto deployment pods
#   AWS_ROLE_ARN: arn:aws:iam::123456789000:role/iam-role-name-here
#   AWS_WEB_IDENTITY_TOKEN_FILE: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
#   AWS_REGION: us-east-1

env: {}

# The names of secrets in the same kubernetes namespace which contain values to be added to the environment
# Each entry should contain a name key, and can optionally specify whether the secret must be defined with an optional key.
# Name is templated.
envFromSecrets: []
# - name: secret-name
#   optional: true

# The names of conifgmaps in the same kubernetes namespace which contain values to be added to the environment
# Each entry should contain a name key, and can optionally specify whether the configmap must be defined with an optional key.
# Name is templated.
# ref: https://kubernetes.io/docs/reference/generated/kubernetes-api/v1.23/#configmapenvsource-v1-core
envFromConfigMaps: []
# - name: configmap-name
#   optional: true

service:
  type: ClusterIP
  port: 4000

ingress:
  enabled: false
  # For Kubernetes >= 1.18 you should specify the ingress-controller via the field ingressClassName
  # See https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/#specifying-the-class-of-an-ingress
  # ingressClassName: nginx
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  path: /
  pathType: ImplementationSpecific
  hosts: []
  #  - chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

grafana:
  enabled: true
  dashboards:
    default:
      teslamate-battery-health:
