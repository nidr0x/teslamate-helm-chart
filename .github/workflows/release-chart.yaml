name: Release Chart

on:
  push:
    branches:
      - master
    paths:
      - "charts/**"
      - ".github/workflows/release-chart.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Cache Helm dependencies
        uses: actions/cache@v4
        with:
          path: |
            charts/teslamate/charts
          key: ${{ runner.os }}-helm-dependencies-${{ hashFiles('charts/teslamate/Chart.yaml', 'charts/teslamate/requirements.yaml') }}
          restore-keys: |
            ${{ runner.os }}-helm-dependencies-

      - name: Add Helm repositories
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts

      - name: Update Helm repositories
        run: helm repo update

      - name: Update Helm dependencies
        run: helm dependency update charts/teslamate

      - name: Lint Chart
        run: helm lint charts/teslamate

      - name: Ensure gh-pages branch exists
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          worktree_dir="$(mktemp -d)"

          git worktree add --detach "$worktree_dir"

          pushd "$worktree_dir"
          git switch --orphan gh-pages
          git rm -rf . >/dev/null 2>&1 || true
          touch .nojekyll index.yaml
          git add .nojekyll index.yaml
          git commit -m "chore: initialize gh-pages branch"
          git push origin gh-pages
          popd

          git worktree remove --force "$worktree_dir"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
